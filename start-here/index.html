let currentView = 'welcome'; // welcome | cardIntro | question | output | final

const app = document.getElementById('app');

function render() {
  window.scrollTo({ top: 0, behavior: 'instant' });
  switch (currentView) {
    case 'welcome': renderWelcome(); break;
    case 'cardIntro': renderCardIntro(); break;
    case 'question': renderQuestion(); break;
    case 'output': renderOutput(); break;
    case 'final': renderFinal(); break;
  }
}

function renderWelcome() {
  const cardPickerHTML = CARDS.map((c, i) => `

      <p class="card-pick-sub">${c.subtitle}</p>

  app.innerHTML = `

      <p class="welcome-lead">
        AI works better when it knows who you are. Most people skip that part.

        <p>Four cards. 31 questions. All multiple choice... no typing, no wrong answers. Just pick what fits.</p>
        <p><strong>Finish Card 1 in two minutes</strong> and you've already given AI more context than most people provide in a year of using it. Ten minutes total for all four.</p>

}

function renderCardIntro() {
  const card = CARDS[currentCard];
  const cardNum = currentCard + 1;
  const qCount = card.questions.length;
  app.innerHTML = `
    <div class="card-intro">
      <p class="progress-card-label" style="margin-bottom:1rem;">CARD ${cardNum} OF 4</p>
      <h2>${card.title}</h2>
      <p>${card.description}</p>
      <span class="time-est">${qCount} easy questions</span>
      <br>
      <button class="btn-begin-card" onclick="beginCard()">Let's go</button>
    </div>
    ${renderFooter()}
  `;
}

function renderQuestion() {
  const card = CARDS[currentCard];
  const q = card.questions[currentQuestion];
  const cardNum = currentCard + 1;
  const qNum = currentQuestion + 1;
  const totalQ = card.questions.length;
  const totalAllQ = CARDS.reduce((sum, c) => sum + c.questions.length, 0);
  const completedQ = CARDS.slice(0, currentCard).reduce((sum, c) => sum + c.questions.length, 0) + currentQuestion;
  const progressPct = ((completedQ + 1) / totalAllQ) * 100;

  const currentAnswers = answers[card.id][q.id] || [];

  let pickLabel = '';
  if (q.pick === 'one') pickLabel = 'Pick one';
  else if (q.pick === 'exactly 2') pickLabel = 'Pick exactly 2';
  else if (q.pick === 'text') pickLabel = '';
  else pickLabel = `Pick ${q.pick}`;

  let contentHTML = '';

  if (q.pick === 'text') {
    const val = answers[card.id][q.id] || '';
    contentHTML = `
      <div class="text-input-wrap">
        <textarea class="text-input" id="textAnswer" rows="3"
          placeholder="${q.placeholder || ''}"
          oninput="handleTextInput(this.value)">${val}</textarea>
        <p class="text-hint">This is for you. Whatever helps AI understand you better.</p>
      </div>
      <div class="nav-buttons">
        <button class="btn-next" onclick="advanceQuestion()">
          ${currentQuestion === totalQ - 1 ? 'See my results' : 'Next'}
        </button>
        ${q.optional ? `<button class="btn-skip" onclick="skipText()">Skip</button>` : ''}
      </div>
    `;
  } else {
    const isMulti = q.pick !== 'one';
    const maxSel = q.max || 1;
    const minSel = q.min || 1;
    const atMax = isMulti && currentAnswers.length >= maxSel;

    contentHTML = `
      <div class="options-list">
        ${q.options.map((opt, i) => {
          const selected = currentAnswers.includes(opt.label);
          const disabled = atMax && !selected;
          return `
            <div class="option-card ${selected ? 'selected' : ''} ${disabled ? 'disabled' : ''}"
                 onclick="selectOption('${escapeStr(opt.label)}', ${isMulti}, ${maxSel})"
                 style="${disabled ? 'opacity:0.35;pointer-events:none;' : ''}">
              <div class="option-label">${opt.label}</div>
              ${opt.desc ? `<div class="option-desc">${opt.desc}</div>` : ''}
            </div>
          `;
        }).join('')}
      </div>
      ${isMulti ? `
        <div class="nav-buttons">
          <button class="btn-next"
            ${currentAnswers.length < minSel ? 'disabled' : ''}
            onclick="advanceQuestion()">
            ${currentQuestion === totalQ - 1 ? 'See my results' : 'Next'}
          </button>
        </div>
      ` : ''}
    `;
  }

  app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-meta">
        <span class="progress-card-label">${card.title}</span>
        <span class="progress-step">${qNum} of ${totalQ}</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${progressPct}%"></div>
      </div>
    </div>
    <div class="question-screen">
      <p class="question-text">${q.text}</p>
      ${pickLabel ? `<p class="question-instruction">${pickLabel}</p>` : ''}
      ${contentHTML}
      ${currentQuestion > 0 ? `<button class="btn-back" onclick="goBack()">Back</button>` : ''}
    </div>
  `;
}

function renderOutput() {
  const card = CARDS[currentCard];
  const cardNum = currentCard + 1;

  const isLast = currentCard === CARDS.length - 1;

  // Build all completed markdown so far

    if (completedCards.includes(i) || i === currentCard) {
      allMd += generateMarkdown(i) + '\n';

  const nextCard = CARDS[currentCard + 1];

  app.innerHTML = `
    <div class="output-screen">

      <h2>${card.outputTitle}</h2>

      <div class="output-block">

      <div class="download-group">

              <path d="M9 3v9m0 0l-3-3m3 3l3-3M3 14h12"/>

      <div class="output-actions">

          </button>

        <button class="btn-done" onclick="finishUp()">
          ${isLast ? 'See my complete profile' : 'I\'m done for now'}
        </button>
      </div>
    </div>
    ${renderFooter()}
  `;
}

  let allMd = generateHeader();

    if (completedCards.includes(i)) {

    </div>

  `;
}

    <div class="site-footer">
      <p>Built by <a href="https://angieqbailey.com" target="_blank">Angie Bailey</a></p>

// EVENT HANDLERS
// ═══════════════════════════════════════════

function startCards() {
  currentView = 'cardIntro';
  currentCard = 0;
  currentQuestion = 0;
  render();
}

function jumpToCard(index) {
  currentView = 'cardIntro';
  currentCard = index;
  currentQuestion = 0;
  render();
}

function beginCard() {
  currentView = 'question';
  currentQuestion = 0;
  render();
}

function selectOption(label, isMulti, maxSel) {
  const card = CARDS[currentCard];
  const q = card.questions[currentQuestion];

  if (!answers[card.id][q.id]) answers[card.id][q.id] = [];

  if (isMulti) {
    const arr = answers[card.id][q.id];
    const idx = arr.indexOf(label);
    if (idx > -1) {
      arr.splice(idx, 1);
      render();
    } else if (arr.length < maxSel) {
      arr.push(label);
      // Auto-advance when max selections reached
      if (arr.length >= maxSel) {
        render();
        setTimeout(() => advanceQuestion(), 350);
      } else {
        render();
      }
    }
  } else {
    answers[card.id][q.id] = [label];
    // Auto-advance after brief delay for single-select
    setTimeout(() => advanceQuestion(), 250);
  }
}

function handleTextInput(val) {
  const card = CARDS[currentCard];
  const q = card.questions[currentQuestion];
  answers[card.id][q.id] = val.trim();
}

function skipText() {
  const card = CARDS[currentCard];
  const q = card.questions[currentQuestion];
  answers[card.id][q.id] = '';
  advanceQuestion();
}

function advanceQuestion() {
  const card = CARDS[currentCard];
  const q = card.questions[currentQuestion];

  // Validate
  if (q.pick !== 'text') {
    const ans = answers[card.id][q.id] || [];
    if (q.min && ans.length < q.min) return;
    if (q.pick === 'one' && ans.length === 0) return;
  }

  if (currentQuestion < card.questions.length - 1) {
    currentQuestion++;
    currentView = 'question';
  } else {
    // Card complete
    if (!completedCards.includes(currentCard)) {
      completedCards.push(currentCard);
    }
    currentView = 'output';
  }
  render();
}

function goBack() {
  if (currentQuestion > 0) {
    currentQuestion--;
    render();
  }
}

function nextCard() {
  if (currentCard < CARDS.length - 1) {
    currentCard++;
    currentQuestion = 0;
    currentView = 'cardIntro';
    render();
  }
}

function finishUp() {
  currentView = 'final';
  render();
}

function continueFromFinal() {
  // Find next incomplete card
  for (let i = 0; i < CARDS.length; i++) {
    if (!completedCards.includes(i)) {
      currentCard = i;
      currentQuestion = 0;
      currentView = 'cardIntro';
      render();
      return;
    }
  }
}

function startOver() {
  CARDS.forEach(c => { answers[c.id] = {}; });
  completedCards = [];
  currentCard = 0;
  currentQuestion = 0;
  currentView = 'welcome';
  render();
}

function gatherText(all) {
  let text = generateHeader();
  if (all) {
    for (let i = 0; i < CARDS.length; i++) {
      if (completedCards.includes(i)) {
        text += generateMarkdown(i) + '\n';
      }
    }
  } else {
    text = generateMarkdown(currentCard);
  }
  return text;
}

function downloadPDF(all, evt) {
  try {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'letter' });

  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const marginL = 20;
  const marginR = 20;
  const maxW = pageW - marginL - marginR;
  let y = 25;

  // Colors
  const night = [18, 26, 40];
  const ecru = [245, 245, 220];
  const quetzal = [0, 168, 150];
  const cacao = [45, 27, 20];

  // Background
  function drawBg() {
    doc.setFillColor(...night);
    doc.rect(0, 0, pageW, pageH, 'F');
  }
  drawBg();

  function checkPage(needed) {
    if (y + needed > pageH - 20) {
      doc.addPage();
      drawBg();
      y = 25;
    }
  }

  // Title
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(28);
  doc.setTextColor(...ecru);
  doc.text('My AI Context', marginL, y);
  y += 10;

  // Subtitle
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(...quetzal);
  doc.text('Built with Start Here  |  angieqbailey.com/start-here', marginL, y);
  y += 5;
  doc.text('Paste this into your AI tool\'s custom instructions or at the start of a conversation.', marginL, y);
  y += 10;

  // Divider
  doc.setDrawColor(...quetzal);
  doc.setLineWidth(0.5);
  doc.line(marginL, y, pageW - marginR, y);
  y += 10;

  // Render sections
  const cards = all ? completedCards.slice().sort() : [currentCard];

  cards.forEach(cardIdx => {
    const md = generateMarkdown(cardIdx);
    const lines = md.split('\n');

    lines.forEach(line => {
      if (!line.trim()) {
        y += 4;
        return;
      }

      if (line.startsWith('## ')) {
        checkPage(16);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(18);
        doc.setTextColor(...ecru);
        doc.text(line.replace('## ', ''), marginL, y);
        y += 9;
      } else if (line.startsWith('*') && line.endsWith('*')) {
        checkPage(8);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(9);
        doc.setTextColor(...quetzal);
        const clean = line.replace(/\*/g, '');
        const wrapped = doc.splitTextToSize(clean, maxW);
        doc.text(wrapped, marginL, y);
        y += wrapped.length * 4.5;
      } else {
        checkPage(8);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(11);
        doc.setTextColor(220, 220, 200);
        const wrapped = doc.splitTextToSize(line, maxW);
        doc.text(wrapped, marginL, y);
        y += wrapped.length * 5.5;
      }
    });

    y += 6;
  });

  // Footer
  checkPage(15);
  y = pageH - 15;
  doc.setDrawColor(...quetzal);
  doc.setLineWidth(0.3);
  doc.line(marginL, y, pageW - marginR, y);
  y += 5;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(...quetzal);
  doc.text('angieqbailey.com/start-here  |  Angie Bailey', marginL, y);

  // Download
  const cardCount = cards.length;
  const fileName = cardCount === 1
    ? 'my-ai-context-' + CARDS[cards[0]].id + '.pdf'
    : 'my-ai-context.pdf';
  doc.save(fileName);

  // Visual feedback on button
  const btn = (evt || window.event || {}).target;
  const btnEl = btn ? btn.closest('.btn-download') : null;
  if (btnEl) {
    const originalHTML = btnEl.innerHTML;
    btnEl.classList.add('done');
    btnEl.innerHTML = `<svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9.5l3.5 3.5 7-7"/></svg> Downloaded`;
    setTimeout(() => {
      btnEl.classList.remove('done');
      btnEl.innerHTML = originalHTML;
    }, 2500);
  }
  } catch(err) {
    console.error('PDF download failed:', err);
    alert('Download failed. Try the "Copy as text" button instead.');
  }
}

function copyText(all, evt) {
  const text = gatherText(all);

  function showFeedback() {
    const target = (evt || window.event || {}).target;
    const btnEl = target ? target.closest('.btn-copy-text') : null;
    if (btnEl) {
      const orig = btnEl.textContent;
      btnEl.textContent = 'Copied to clipboard';
      setTimeout(() => { btnEl.textContent = orig; }, 2000);
    }
  }

  // Try modern clipboard API first, fall back to execCommand
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(showFeedback).catch(function() {
      fallbackCopy(text);
      showFeedback();
    });
  } else {
    fallbackCopy(text);
    showFeedback();
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

// ═══════════════════════════════════════════
// MARKDOWN OUTPUT GENERATION
// ═══════════════════════════════════════════

function generateHeader() {
  return `# My AI Context
> Built with Start Here (angieqbailey.com/start-here)
> Paste this into your AI tool's custom instructions or at the start of a conversation.

---

`;
}

function get(cardId, qId) {
  const val = answers[cardId]?.[qId];
  if (!val) return [];
  if (typeof val === 'string') return val;
  return val;
}

function joinNatural(arr) {
  if (!arr || arr.length === 0) return '';
  if (arr.length === 1) return arr[0].toLowerCase();
  if (arr.length === 2) return arr[0].toLowerCase() + ' and ' + arr[1].toLowerCase();
  return arr.slice(0, -1).map(s => s.toLowerCase()).join(', ') + ' and ' + arr[arr.length - 1].toLowerCase();
}

function joinNaturalKeepCase(arr) {
  if (!arr || arr.length === 0) return '';
  if (arr.length === 1) return arr[0];
  if (arr.length === 2) return arr[0] + ' and ' + arr[1];
  return arr.slice(0, -1).join(', ') + ' and ' + arr[arr.length - 1];
}

const ARCHETYPE_DESC = {
  'Fixer': 'I fix what\'s broken and subtract what\'s not working',
  'Detective': 'I verify before I trust',
  'Maverick': 'I move fast and figure it out later',
  'Operator': 'I maintain what works and protect the standard'
};

const ARCHETYPE_NOW = {
  'Fixer': 'cutting, prioritizing, trying to get ahead of the mess',
  'Detective': 'verifying, analyzing, trying to understand before acting',
  'Maverick': 'moving fast, making calls, trying to ship before the window closes',
  'Operator': 'maintaining, protecting, trying to keep what works running'
};

function generateMarkdown(cardIndex) {
  const card = CARDS[cardIndex];
  switch(card.id) {
    case 'context': return genContext();
    case 'interaction': return genInteraction();
    case 'rightnow': return genRightNow();
    case 'fieldguide': return genFieldGuide();
  }
  return '';
}

function genContext() {
  const role = (get('context', 'role')[0] || '').toLowerCase();
  const exp = (get('context', 'experience')[0] || '').toLowerCase();
  const industry = (get('context', 'industry')[0] || '').toLowerCase();
  const func = (get('context', 'function')[0] || '').toLowerCase();
  const skills = get('context', 'skills') || [];
  const env = get('context', 'environment') || [];
  const life = (get('context', 'life')[0] || '').toLowerCase();
  const frust = get('context', 'frustrations') || [];
  const goals = get('context', 'aiGoals') || [];
  const note = get('context', 'contextNote');

  let md = `## Who I Am\n\n`;

  if (role && exp && industry && func) {
    const article = /^[aeiou]/.test(exp) ? 'an' : 'a';
    md += `I'm ${article} ${exp} ${role} in ${industry}, working in ${func}.\n\n`;
  }

  if (skills.length > 0) {
    md += `My work runs on ${joinNatural(skills.map(toGerund))}. `;
  }
  if (env.length > 0) {
    md += `The environment is usually ${joinNatural(env)}.`;
  }
  md += '\n\n';

  if (life) {
    md += `Life outside work: ${life}.\n\n`;
  }

  if (frust.length > 0) {
    md += `What frustrates me most at work: ${joinNatural(frust)}.\n\n`;
  }

  if (goals.length > 0) {
    md += `Where I want AI headed long-term: ${dedupePrefix(goals, 'help me ')}.\n\n`;
  }

  if (note) {
    md += `One thing to know: "${note}"\n\n`;
  }

  return md;
}

function genInteraction() {
  const arch = get('interaction', 'archetype')[0] || '';
  const wants = get('interaction', 'wants') || [];
  const dislikes = get('interaction', 'dislikes') || [];
  const pressure = get('interaction', 'pressure') || [];
  const outputs = get('interaction', 'outputs') || [];
  const optimize = get('interaction', 'optimize') || [];
  const note = get('interaction', 'interactionNote');

  let md = `## How to Work With Me\n\n`;

  if (arch) {
    md += `My default mode is ${arch}. ${ARCHETYPE_DESC[arch] || ''}.\n\n`;
  }

  if (wants.length > 0) {
    md += `When I come to AI, I usually want it to ${dedupePrefix(wants, 'help me ')}.\n\n`;
  }

  if (dislikes.length > 0) {
    md += `I do not want responses that are ${joinNatural(dislikes)}.\n\n`;
  }

  if (pressure.length > 0) {
    md += `When I'm under pressure: ${joinPressure(pressure)}. That's when I need AI to pull me up, not dig deeper with me.\n\n`;
  }

  if (outputs.length > 0) {
    md += `Most useful outputs: ${joinNatural(outputs)}. `;
  }
  if (optimize.length > 0) {
    md += `Optimize for ${joinNatural(optimize)}.`;
  }
  md += '\n\n';

  if (note) {
    md += `One thing to know: "${note}"\n\n`;
  }

  return md;
}

function genRightNow() {
  const state = get('rightnow', 'state')[0] || '';
  const needs = get('rightnow', 'needs') || [];
  const bw = get('rightnow', 'bandwidth') || [];
  const frust = (get('rightnow', 'frustrationNow')[0] || '').toLowerCase();
  const priorities = get('rightnow', 'priorities') || [];
  const output = (get('rightnow', 'outputNow')[0] || '').toLowerCase();
  const note = get('rightnow', 'rightnowNote');

  let md = `## Right Now\n\n`;
  md += `*Update this card when your situation changes. This is temporary context.*\n\n`;

  if (state) {
    md += `I'm in ${state} mode right now. ${ARCHETYPE_NOW[state] ? ARCHETYPE_NOW[state].charAt(0).toUpperCase() + ARCHETYPE_NOW[state].slice(1) : ''}.\n\n`;
  }

  if (needs.length > 0) {
    md += `What I need most right now: ${joinNatural(needs)}.\n\n`;
  }

  if (bw.length > 0) {
    md += `My bandwidth is squeezed by ${joinNatural(bw)}.`;
    if (frust) md += ` Main frustration: ${frust}.`;
    md += '\n\n';
  }

  if (priorities.length > 0) {
    md += `In this moment, prioritize ${joinNatural(priorities)}.`;
    if (output) md += ` I need a ${output}, not a deep analysis.`;
    md += '\n\n';
  }

  if (note) {
    md += `Right now: "${note}"\n\n`;
  }

  return md;
}

function genFieldGuide() {
  const useful = get('fieldguide', 'useful') || [];
  const overtrust = get('fieldguide', 'overtrust') || [];
  const misuse = get('fieldguide', 'misuse') || [];
  const slow = get('fieldguide', 'slowdown') || [];
  const check = get('fieldguide', 'checkself') || [];
  const help = get('fieldguide', 'helpwithout') || [];
  const note = get('fieldguide', 'fieldguideNote');

  let md = `## My AI Guardrails\n\n`;

  if (useful.length > 0) {
    md += `Where AI helps me most: ${joinNatural(useful)}.\n\n`;
  }

  if (overtrust.length > 0) {
    md += `Where I over-trust AI: ${joinNatural(overtrust)}.\n`;
  }
  if (misuse.length > 0) {
    md += `Where I misuse AI: ${joinNatural(misuse)}.\n\n`;
  }

  if (slow.length > 0) {
    md += `Slow down and review carefully when working on: ${joinNatural(slow)}.\n\n`;
  }

  if (check.length > 0) {
    md += `My check-yourself move before using AI output: ${joinNatural(check)}.\n\n`;
  }

  if (help.length > 0) {
    md += `I want AI to help me ${joinNatural(help)}... without taking over.\n\n`;
  }

  if (note) {
    md += `Watch out for this: "${note}"\n\n`;
  }

  return md;
}

// UTILITIES
// ═══════════════════════════════════════════

function toGerund(phrase) {
  // "Solve messy problems" → "solving messy problems"
  const verbMap = {
    'write': 'writing', 'make': 'making', 'manage': 'managing',
    'solve': 'solving', 'organize': 'organizing', 'communicate': 'communicating',
    'move': 'moving', 'create': 'creating', 'handle': 'handling',
    'build': 'building', 'save': 'saving', 'improve': 'improving',
    'help': 'helping', 'reduce': 'reducing', 'get': 'getting'
  };
  const words = phrase.split(' ');
  const firstWord = words[0].toLowerCase();
  if (verbMap[firstWord]) {
    words[0] = verbMap[firstWord];
  } else if (firstWord.endsWith('e')) {
    words[0] = firstWord.slice(0, -1) + 'ing';
  } else {
    words[0] = firstWord + 'ing';
  }
  return words.join(' ').toLowerCase();
}

function joinPressure(arr) {
  // Keep capital I for first-person statements like "I overthink"
  if (!arr || arr.length === 0) return '';
  if (arr.length === 1) return arr[0];
  // Don't lowercase if the item starts with "I " (first person)
  const lowerFirst = (s) => s.startsWith('I ') ? s : s.charAt(0).toLowerCase() + s.slice(1);
  if (arr.length === 2) return arr[0] + ' and ' + lowerFirst(arr[1]);
  return arr.slice(0, -1).join(', ') + ' and ' + lowerFirst(arr[arr.length - 1]);
}

function dedupePrefix(arr, prefix) {
  // "Help me think clearly" + "Help me reduce overwhelm" → "help me think clearly and reduce overwhelm"
  const lowerPrefix = prefix.toLowerCase();
  if (!arr || arr.length === 0) return '';
  const cleaned = arr.map((s, i) => {
    const lower = s.toLowerCase();
    if (i > 0 && lower.startsWith(lowerPrefix)) {
      return lower.slice(lowerPrefix.length).trim();
    }
    return lower;
  });
  if (cleaned.length === 1) return cleaned[0];
  if (cleaned.length === 2) return cleaned[0] + ' and ' + cleaned[1];
  return cleaned.slice(0, -1).join(', ') + ' and ' + cleaned[cleaned.length - 1];
}

function escapeStr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '\\"');
}

function escapeHTML(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
