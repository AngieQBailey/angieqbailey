<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start Here | Build Your AI Context | Angie Bailey</title>
<meta name="description" content="AI works better when it knows who you are. Answer a few questions, get a personal profile you can paste into any AI tool.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Imbue:opsz,wght@10..100,400;10..100,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --night: #121A28;
  --cacao: #2D1B14;
  --quetzal: #00685E;
  --quetzal-bright: #00A896;
  --ecru: #F5F5DC;
  --rosso: #C41E3A;
  --card-bg: rgba(245, 245, 220, 0.08);
  --card-bg-hover: rgba(245, 245, 220, 0.14);
  --card-bg-selected: rgba(0, 168, 150, 0.18);
  --font-verdict: 'Imbue', serif;
  --font-evidence: 'IBM Plex Sans', sans-serif;
  --font-clue: 'IBM Plex Mono', monospace;
}

html { font-size: 18px; scroll-behavior: smooth; }

body {
  background: var(--night);
  color: var(--ecru);
  font-family: var(--font-evidence);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

em, i { font-style: normal; font-weight: 600; }

#app {
  max-width: 640px;
  margin: 0 auto;
  padding: 2rem 1.25rem 4rem;
  min-height: 100vh;
}

.welcome { animation: fadeUp 0.5s ease; }

.welcome h1 {
  font-family: var(--font-verdict);
  font-size: clamp(2.8rem, 8vw, 4.5rem);
  font-weight: 700;
  line-height: 1.05;
  color: var(--ecru);
  margin-bottom: 1.5rem;
  letter-spacing: -0.02em;
}

.welcome h1 span { color: var(--quetzal-bright); }

.welcome-lead {
  font-family: var(--font-verdict);
  font-size: 1.65rem;
  font-weight: 400;
  font-variation-settings: 'opsz' 100;
  line-height: 1.5;
  color: rgba(245, 245, 220, 0.85);
  margin-bottom: 2rem;
  max-width: 520px;
}

.welcome-details {
  border-left: 3px solid var(--quetzal);
  padding-left: 1.25rem;
  margin-bottom: 2.5rem;
}

.welcome-details p {
  font-family: var(--font-evidence);
  font-size: 1.2rem;
  color: rgba(245, 245, 220, 0.7);
  margin-bottom: 0.75rem;
  line-height: 1.6;
}

.welcome-details strong {
  color: var(--ecru);
  font-weight: 600;
}

.card-picker {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
  margin-top: 0.5rem;
}

.card-pick {
  background: var(--card-bg);
  border: 1px solid rgba(245, 245, 220, 0.1);
  padding: 1.25rem 1rem;
  cursor: pointer;
  transition: all 0.2s ease;
  -webkit-tap-highlight-color: transparent;
  text-align: left;
  position: relative;
}

.card-pick:hover {
  background: var(--card-bg-hover);
  border-color: rgba(245, 245, 220, 0.2);
}

.card-pick:first-child {
  border-color: var(--rosso);
  background: rgba(196, 30, 58, 0.08);
}

.card-pick:first-child:hover {
  background: rgba(196, 30, 58, 0.15);
}

.card-pick-num {
  font-family: var(--font-clue);
  font-size: 0.85rem;
  color: var(--quetzal-bright);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 0.4rem;
}

.card-pick:first-child .card-pick-num {
  color: var(--rosso);
}

.card-pick-title {
  font-family: var(--font-verdict);
  font-size: 1.9rem;
  font-weight: 400;
  font-variation-settings: 'opsz' 100;
  color: var(--ecru);
  line-height: 1.2;
  margin-bottom: 0.3rem;
}

.card-pick-sub {
  font-family: var(--font-evidence);
  font-size: 0.95rem;
  color: rgba(245, 245, 220, 0.5);
  line-height: 1.4;
}

.card-pick-meta {
  font-family: var(--font-clue);
  font-size: 0.85rem;
  color: var(--quetzal-bright);
  margin-top: 0.6rem;
}

@media (max-width: 480px) {
  .card-picker { grid-template-columns: 1fr; }
}

.btn-start {
  display: inline-block;
  background: var(--rosso);
  color: var(--ecru);
  font-family: var(--font-evidence);
  font-size: 1.2rem;
  font-weight: 600;
  padding: 1rem 2.5rem;
  border: none;
  cursor: pointer;
  letter-spacing: 0.01em;
  transition: background 0.2s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}

.btn-start:hover { background: #d42a47; }
.btn-start:active { transform: scale(0.98); }

.progress-wrap {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--night);
  padding: 1rem 0 0.75rem;
  margin-bottom: 1rem;
}

.progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 0.5rem;
}

.progress-card-label {
  font-family: var(--font-clue);
  font-size: 0.95rem;
  color: var(--quetzal-bright);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.progress-step {
  font-family: var(--font-clue);
  font-size: 0.95rem;
  color: rgba(245, 245, 220, 0.5);
}

.progress-bar {
  height: 3px;
  background: rgba(245, 245, 220, 0.1);
  position: relative;
}

.progress-fill {
  height: 100%;
  background: var(--rosso);
  transition: width 0.4s ease;
}

.card-intro {
  animation: fadeUp 0.4s ease;
  margin-bottom: 2rem;
}

.card-intro .progress-card-label {
  color: var(--rosso);
}

.card-intro h2 {
  font-family: var(--font-verdict);
  font-size: clamp(2rem, 6vw, 3rem);
  font-weight: 700;
  color: var(--ecru);
  line-height: 1.1;
  margin-bottom: 0.75rem;
}

.card-intro p {
  font-size: 1.25rem;
  color: rgba(245, 245, 220, 0.7);
  line-height: 1.6;
  max-width: 520px;
}

.card-intro .time-est {
  font-family: var(--font-clue);
  font-size: 1rem;
  color: var(--quetzal-bright);
  margin-top: 1rem;
  display: inline-block;
}

.btn-begin-card {
  display: inline-block;
  background: transparent;
  color: var(--quetzal-bright);
  font-family: var(--font-evidence);
  font-size: 1.15rem;
  font-weight: 600;
  padding: 0.85rem 2rem;
  border: 2px solid var(--quetzal-bright);
  cursor: pointer;
  margin-top: 1.5rem;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}

.btn-begin-card:hover {
  background: var(--quetzal-bright);
  color: var(--night);
}

.question-screen { animation: fadeUp 0.35s ease; }

.question-text {
  font-family: var(--font-verdict);
  font-size: clamp(1.8rem, 5.5vw, 2.4rem);
  font-weight: 700;
  font-variation-settings: 'opsz' 100;
  color: var(--ecru);
  line-height: 1.3;
  margin-bottom: 0.5rem;
}

.question-instruction {
  font-family: var(--font-clue);
  font-size: 1rem;
  color: rgba(245, 245, 220, 0.45);
  margin-bottom: 1.5rem;
}

.options-list {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  margin-bottom: 1.5rem;
}

.option-card {
  background: var(--card-bg);
  border: 1px solid rgba(245, 245, 220, 0.08);
  padding: 1rem 1.25rem;
  cursor: pointer;
  transition: all 0.15s ease;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  position: relative;
}

.option-card:hover {
  background: var(--card-bg-hover);
  border-color: rgba(245, 245, 220, 0.15);
}

.option-card.selected {
  background: var(--card-bg-selected);
  border-color: var(--quetzal-bright);
}

.option-card.selected::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--quetzal-bright);
}

.option-label {
  font-family: var(--font-verdict);
  font-size: 1.35rem;
  font-weight: 400;
  font-variation-settings: 'opsz' 80;
  color: var(--ecru);
  line-height: 1.35;
}

.option-desc {
  font-family: var(--font-evidence);
  font-size: 1.1rem;
  color: rgba(245, 245, 220, 0.55);
  margin-top: 0.3rem;
  line-height: 1.45;
}

.option-card.selected .option-label { color: var(--quetzal-bright); }

.max-warning {
  font-family: var(--font-clue);
  font-size: 1rem;
  color: var(--rosso);
  margin-bottom: 1rem;
  opacity: 0;
  transition: opacity 0.2s;
}

.max-warning.visible { opacity: 1; }

.text-input-wrap { margin-bottom: 1.5rem; }

.text-input {
  width: 100%;
  background: var(--card-bg);
  border: 1px solid rgba(245, 245, 220, 0.15);
  color: var(--ecru);
  font-family: var(--font-evidence);
  font-size: 1.1rem;
  padding: 1rem 1.25rem;
  line-height: 1.5;
  resize: none;
  outline: none;
  transition: border-color 0.2s;
}

.text-input:focus { border-color: var(--quetzal-bright); }

.text-input::placeholder { color: rgba(245, 245, 220, 0.3); }

.text-hint {
  font-family: var(--font-clue);
  font-size: 0.95rem;
  color: rgba(245, 245, 220, 0.4);
  margin-top: 0.5rem;
}

.nav-buttons {
  display: flex;
  gap: 1rem;
  margin-top: 1.5rem;
}

.btn-next {
  background: var(--quetzal-bright);
  color: var(--night);
  font-family: var(--font-evidence);
  font-size: 1.1rem;
  font-weight: 600;
  padding: 0.85rem 2rem;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}

.btn-next:hover { background: #00c4af; }
.btn-next:disabled { opacity: 0.3; cursor: default; }
.btn-next:disabled:hover { background: var(--quetzal-bright); }

.btn-skip {
  background: transparent;
  color: rgba(245, 245, 220, 0.5);
  font-family: var(--font-evidence);
  font-size: 1.1rem;
  font-weight: 500;
  padding: 0.85rem 1.5rem;
  border: 1px solid rgba(245, 245, 220, 0.15);
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}

.btn-skip:hover {
  color: var(--ecru);
  border-color: rgba(245, 245, 220, 0.3);
}

.btn-back {
  background: transparent;
  color: rgba(245, 245, 220, 0.4);
  font-family: var(--font-clue);
  font-size: 0.95rem;
  padding: 0.5rem 0;
  border: none;
  cursor: pointer;
  transition: color 0.2s;
  -webkit-tap-highlight-color: transparent;
  margin-top: 0.5rem;
}

.btn-back:hover { color: var(--ecru); }

.output-screen { animation: fadeUp 0.4s ease; }

.output-screen h2 {
  font-family: var(--font-verdict);
  font-size: clamp(1.8rem, 5vw, 2.5rem);
  font-weight: 700;
  color: var(--ecru);
  line-height: 1.15;
  margin-bottom: 0.5rem;
}

.output-screen .output-subtitle {
  font-size: 1.15rem;
  color: rgba(245, 245, 220, 0.65);
  margin-bottom: 1.5rem;
  line-height: 1.5;
}

.output-block {
  background: rgba(245, 245, 220, 0.06);
  border-left: 3px solid var(--quetzal);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1rem;
  position: relative;
}

.output-block pre {
  font-family: var(--font-clue);
  font-size: 0.875rem;
  color: rgba(245, 245, 220, 0.85);
  white-space: pre-wrap;
  word-wrap: break-word;
  line-height: 1.7;
}

.btn-copy-text {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--quetzal-bright);
  color: var(--night);
  font-family: var(--font-evidence);
  font-size: 1rem;
  font-weight: 600;
  padding: 0.85rem 1.5rem;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}

.btn-copy-text:hover { background: #00c4af; }
.btn-copy-text:active { transform: scale(0.98); }

.btn-copy-text.done {
  background: rgba(0, 168, 150, 0.3);
  color: var(--quetzal-bright);
}

.download-group {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  align-items: center;
  margin-bottom: 2rem;
}

.output-actions {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  margin-top: 2rem;
}

.btn-continue {
  background: var(--quetzal-bright);
  color: var(--night);
  font-family: var(--font-evidence);
  font-size: 1rem;
  font-weight: 600;
  padding: 1rem 2rem;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  -webkit-tap-highlight-color: transparent;
}

.btn-continue:hover { background: #00c4af; }

.btn-continue .btn-sub {
  display: block;
  font-size: 0.85rem;
  font-weight: 400;
  opacity: 0.7;
  margin-top: 0.2rem;
}

.btn-done {
  background: transparent;
  color: rgba(245, 245, 220, 0.6);
  font-family: var(--font-evidence);
  font-size: 1rem;
  font-weight: 500;
  padding: 0.85rem 2rem;
  border: 1px solid rgba(245, 245, 220, 0.15);
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  -webkit-tap-highlight-color: transparent;
}

.btn-done:hover {
  color: var(--ecru);
  border-color: rgba(245, 245, 220, 0.3);
}

.final-screen { animation: fadeUp 0.4s ease; }

.final-screen h2 {
  font-family: var(--font-verdict);
  font-size: clamp(2rem, 6vw, 3rem);
  font-weight: 700;
  color: var(--ecru);
  line-height: 1.1;
  margin-bottom: 0.75rem;
}

.final-screen .final-subtitle {
  font-size: 1.15rem;
  color: rgba(245, 245, 220, 0.65);
  margin-bottom: 0.5rem;
  line-height: 1.5;
}

.paste-instructions {
  background: rgba(245, 245, 220, 0.06);
  border-left: 3px solid var(--quetzal);
  padding: 1rem 1.25rem;
  margin: 1.5rem 0;
}

.paste-instructions p {
  font-family: var(--font-evidence);
  font-size: 1.1rem;
  color: rgba(245, 245, 220, 0.75);
  line-height: 1.6;
  margin-bottom: 0.5rem;
}

.paste-instructions p:last-child { margin-bottom: 0; }

.paste-instructions strong { color: var(--ecru); }

.section-divider {
  border: none;
  border-top: 1px solid rgba(245, 245, 220, 0.08);
  margin: 2rem 0;
}

.site-footer {
  margin-top: 4rem;
  padding-top: 2rem;
  border-top: 1px solid rgba(245, 245, 220, 0.08);
}

.site-footer p {
  font-family: var(--font-clue);
  font-size: 0.95rem;
  color: rgba(245, 245, 220, 0.35);
  line-height: 1.6;
}

.site-footer a {
  color: var(--quetzal-bright);
  text-decoration: none;
}

.site-footer a:hover { text-decoration: underline; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 480px) {
  #app { padding: 1.5rem 1rem 3rem; }
  .option-card { padding: 0.9rem 1rem; }
  .output-block { padding: 1rem; }
  .nav-buttons { flex-direction: column; }
  .btn-next, .btn-skip { width: 100%; text-align: center; }
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--night); }
::-webkit-scrollbar-thumb { background: rgba(245, 245, 220, 0.15); }
::-webkit-scrollbar-thumb:hover { background: rgba(245, 245, 220, 0.25); }
</style>
</head>

<script>
// Load card data from JSON block (avoids all quoting issues)
var CARDS = JSON.parse(document.getElementById("card-data").textContent);

// STATE
var currentView = "welcome";
var currentCard = 0;
var currentQuestion = 0;
var answers = {};
var completedCards = [];
var otherText = {};

var i;
for (i = 0; i < CARDS.length; i++) {
  answers[CARDS[i].id] = {};
}

// UTILITIES
function escapeAttr(s) {
  if (typeof s !== "string") return "";
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function escapeHTML(s) {
  if (typeof s !== "string") return "";
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// RENDERING
var app = document.getElementById("app");

function render() {
  window.scrollTo({ top: 0, behavior: "instant" });
  switch (currentView) {
    case "welcome": renderWelcome(); break;
    case "cardIntro": renderCardIntro(); break;
    case "question": renderQuestion(); break;
    case "output": renderOutput(); break;
    case "final": renderFinal(); break;
  }
}

function renderFooter() {
  return '<div class="site-footer"><p>Built by <a href="https://angieqbailey.com">Angie Bailey</a></p></div>';
}

function jumpToCard(idx) {
  currentCard = idx;
  currentQuestion = 0;
  currentView = "cardIntro";
  render();
}

function beginCard() {
  currentQuestion = 0;
  currentView = "question";
  render();
}

function renderWelcome() {
  var html = "";
  var ci;
  for (ci = 0; ci < CARDS.length; ci++) {
    html += '<div class="card-pick" onclick="jumpToCard(' + ci + ')">';
    html += '<p class="card-pick-num">Card ' + (ci + 1) + '</p>';
    html += '<p class="card-pick-title">' + CARDS[ci].title + '</p>';
    html += '<p class="card-pick-sub">' + CARDS[ci].subtitle + '</p>';
    html += '<p class="card-pick-meta">' + CARDS[ci].questions.length + ' questions</p>';
    html += '</div>';
  }

  app.innerHTML = '<div class="welcome">' +
    '<h1>Start <span>Here</span></h1>' +
    '<p class="welcome-lead">AI works better when it knows who you are. Most people skip that part.</p>' +
    '<div class="welcome-details">' +
    '<p>Four cards. 31 questions. All multiple choice... no typing, no wrong answers. Just pick what fits.</p>' +
    '<p><strong>Finish Card 1 in two minutes</strong> and you have already given AI more context than most people provide in a year of using it. Ten minutes total for all four.</p>' +
    '<p>Finish all four and you get Boardwalk and a Get-Out-of-Jail-Free card. (Not really. But you do get a personal AI profile most people will never bother to build.)</p>' +
    '</div>' +
    '<div class="card-picker">' + html + '</div>' +
    '</div>' + renderFooter();
}

function renderCardIntro() {
  var card = CARDS[currentCard];
  var cardNum = currentCard + 1;
  var qCount = card.questions.length;
  app.innerHTML = '<div class="card-intro">' +
    '<p class="progress-card-label" style="margin-bottom:1rem;">CARD ' + cardNum + ' OF 4</p>' +
    '<h2>' + card.title + '</h2>' +
    '<p>' + card.description + '</p>' +
    '<span class="time-est">' + qCount + ' easy questions</span><br>' +
    '<button class="btn-begin-card" onclick="beginCard()">Let\'s go</button>' +
    '</div>' + renderFooter();
}

function renderQuestion() {
  var card = CARDS[currentCard];
  var q = card.questions[currentQuestion];
  var cardNum = currentCard + 1;
  var qNum = currentQuestion + 1;
  var totalQ = card.questions.length;
  var totalAllQ = 0;
  var completedQ = 0;
  var ti;
  for (ti = 0; ti < CARDS.length; ti++) {
    totalAllQ += CARDS[ti].questions.length;
  }
  for (ti = 0; ti < currentCard; ti++) {
    completedQ += CARDS[ti].questions.length;
  }
  completedQ += currentQuestion;
  var progressPct = ((completedQ + 1) / totalAllQ) * 100;

  var currentAnswers = answers[card.id][q.id] || [];

  var pickLabel = "";
  if (q.pick === "one") pickLabel = "Pick one";
  else if (q.pick === "exactly 2") pickLabel = "Pick exactly 2";
  else if (q.pick === "text") pickLabel = "";
  else pickLabel = "Pick " + q.pick;

  var contentHTML = "";

  if (q.pick === "text") {
    var val = answers[card.id][q.id] || "";
    contentHTML = '<div class="text-input-wrap">' +
      '<textarea class="text-input" id="textAnswer" rows="3" placeholder="' + escapeAttr(q.placeholder || "") + '" oninput="handleTextInput(this.value)">' + escapeHTML(val) + '</textarea>' +
      '<p class="text-hint">This is for you. Whatever helps AI understand you better.</p>' +
      '</div>' +
      '<div class="nav-buttons">' +
      '<button class="btn-next" onclick="advanceQuestion()">' + (currentQuestion === totalQ - 1 ? "See my results" : "Next") + '</button>' +
      (q.optional ? '<button class="btn-skip" onclick="skipText()">Skip</button>' : "") +
      '</div>';
  } else {
    var isMulti = q.pick !== "one";
    var maxSel = q.max || 1;
    var minSel = q.min || 1;
    var atMax = isMulti && currentAnswers.length >= maxSel;

    var optionsHTML = "";
    var oi;
    for (oi = 0; oi < q.options.length; oi++) {
      var opt = q.options[oi];
      var selected = currentAnswers.indexOf(opt.label) > -1;
      var disabled = atMax && !selected;
      optionsHTML += '<div class="option-card' + (selected ? " selected" : "") + (disabled ? " disabled" : "") + '"';
      optionsHTML += ' onclick="selectOption(' + oi + ', ' + isMulti + ', ' + maxSel + ')"';
      if (disabled) optionsHTML += ' style="opacity:0.35;pointer-events:none;"';
      optionsHTML += '>';
      optionsHTML += '<div class="option-label">' + opt.label + '</div>';
      if (opt.desc) optionsHTML += '<div class="option-desc">' + opt.desc + '</div>';
      optionsHTML += '</div>';
    }

    var otherInput = "";
    if (currentAnswers.indexOf("Other") > -1) {
      var otherKey = card.id + "_" + q.id;
      otherInput = '<div class="text-input-wrap" style="margin-top:0.5rem;">' +
        '<input type="text" class="text-input" placeholder="Tell us what fits..."' +
        ' value="' + escapeAttr(otherText[otherKey] || "") + '"' +
        ' oninput="handleOtherInput(this.value)" style="padding:0.75rem 1rem;">' +
        '</div>';
    }

    var navBtn = "";
    if (isMulti || currentAnswers.indexOf("Other") > -1) {
      navBtn = '<div class="nav-buttons">' +
        '<button class="btn-next"' + (currentAnswers.length < minSel ? " disabled" : "") +
        ' onclick="advanceQuestion()">' +
        (currentQuestion === totalQ - 1 ? "See my results" : "Next") +
        '</button></div>';
    }

    contentHTML = '<div class="options-list">' + optionsHTML + '</div>' + otherInput + navBtn;
  }

  app.innerHTML = '<div class="progress-wrap">' +
    '<div class="progress-meta">' +
    '<span class="progress-card-label">' + card.title + '</span>' +
    '<span class="progress-step">' + qNum + ' of ' + totalQ + '</span>' +
    '</div>' +
    '<div class="progress-bar"><div class="progress-fill" style="width:' + progressPct + '%"></div></div>' +
    '</div>' +
    '<div class="question-screen">' +
    '<p class="question-text">' + q.text + '</p>' +
    (pickLabel ? '<p class="question-instruction">' + pickLabel + '</p>' : "") +
    contentHTML +
    (currentQuestion > 0 ? '<button class="btn-back" onclick="goBack()">Back</button>' : "") +
    '</div>';
}

var COPY_SVG = '<svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2H4a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2V4a2 2 0 00-2-2h-2"/><rect x="6" y="1" width="6" height="3" rx="1"/></svg>';

function renderOutput() {
  var card = CARDS[currentCard];
  var cardNum = currentCard + 1;
  var md = generateMarkdown(currentCard);
  var isLast = currentCard === CARDS.length - 1;
  var nextCardData = CARDS[currentCard + 1];

  var copyAllBtn = "";
  if (completedCards.length > 0 || currentCard > 0) {
    copyAllBtn = '<button class="btn-copy-text" onclick="copyText(true, event)">' +
      COPY_SVG + ' Copy everything so far</button>';
  }

  var nextBtn = "";
  if (!isLast && nextCardData) {
    nextBtn = '<button class="btn-continue" onclick="nextCard()">' +
      'Continue to Card ' + (cardNum + 1) + ': ' + nextCardData.title +
      '<span class="btn-sub">' + nextCardData.subtitle + '</span></button>';
  }

  app.innerHTML = '<div class="output-screen">' +
    '<p class="progress-card-label" style="margin-bottom:0.75rem;">CARD ' + cardNum + ' COMPLETE</p>' +
    '<h2>' + card.outputTitle + '</h2>' +
    '<p class="output-subtitle">Here\'s what you just built. This is ready to copy and paste into any AI tool\'s custom instructions.</p>' +
    '<div class="output-block"><pre id="outputText">' + escapeHTML(md) + '</pre></div>' +
    '<div class="download-group">' +
    '<button class="btn-copy-text" onclick="copyText(false, event)">' +
    COPY_SVG + ' Copy this card</button>' +
    copyAllBtn +
    '</div>' +
    '<div class="output-actions">' + nextBtn +
    '<button class="btn-done" onclick="finishUp()">' +
    (isLast ? "See my complete profile" : "I\'m done for now") +
    '</button>' +
    '</div>' +
    '</div>' + renderFooter();
}

function renderFinal() {
  var allMd = generateHeader();
  var fi;
  for (fi = 0; fi < CARDS.length; fi++) {
    if (completedCards.indexOf(fi) > -1) {
      allMd += generateMarkdown(fi) + "\n";
    }
  }

  var completedCount = completedCards.length;
  var remaining = 4 - completedCount;

  var continueBtn = "";
  if (remaining > 0) {
    continueBtn = '<hr class="section-divider"><div class="output-actions">' +
      '<button class="btn-continue" onclick="continueFromFinal()">' +
      'Continue to Card ' + (completedCount + 1) + ': ' + CARDS[completedCount].title +
      '<span class="btn-sub">Add another layer of context</span>' +
      '</button>' +
      '<button class="btn-done" onclick="startOver()">Start over</button>' +
      '</div>';
  } else {
    continueBtn = '<div class="output-actions">' +
      '<button class="btn-done" onclick="startOver()">Start over</button>' +
      '</div>';
  }

  app.innerHTML = '<div class="final-screen">' +
    '<h2>Your AI Context</h2>' +
    '<p class="final-subtitle">' + completedCount + ' of 4 cards complete.' +
    (remaining > 0 ? " Come back for the rest when you are ready." : " Full profile built.") + '</p>' +
    '<div class="paste-instructions">' +
    '<p><strong>Where to paste this:</strong></p>' +
    '<p><strong>ChatGPT:</strong> Settings > Personalization > Custom Instructions</p>' +
    '<p><strong>Claude:</strong> Your profile preferences, or paste at the start of a conversation</p>' +
    '<p><strong>Gemini:</strong> Settings > Extensions, or paste at the start of a conversation</p>' +
    '<p>Any AI tool. Paste it once. It works until you change.</p>' +
    '</div>' +
    '<div class="output-block"><pre id="finalOutput">' + escapeHTML(allMd) + '</pre></div>' +
    '<div class="download-group">' +
    '<button class="btn-copy-text" onclick="copyText(true, event)">' +
    COPY_SVG + ' Copy my full profile</button>' +
    '</div>' +
    continueBtn +
    '</div>' + renderFooter();
}

// INTERACTION - use index-based option selection to avoid quoting issues
function selectOption(optIndex, isMulti, maxSel) {
  var card = CARDS[currentCard];
  var q = card.questions[currentQuestion];
  var label = q.options[optIndex].label;

  if (!answers[card.id][q.id]) answers[card.id][q.id] = [];

  if (isMulti) {
    var arr = answers[card.id][q.id];
    var idx = arr.indexOf(label);
    if (idx > -1) {
      arr.splice(idx, 1);
      if (label === "Other") delete otherText[card.id + "_" + q.id];
      render();
    } else if (arr.length < maxSel) {
      arr.push(label);
      if (arr.length >= maxSel && arr.indexOf("Other") === -1) {
        render();
        setTimeout(function() { advanceQuestion(); }, 350);
      } else {
        render();
      }
    }
  } else {
    answers[card.id][q.id] = [label];
    if (label !== "Other") delete otherText[card.id + "_" + q.id];
    if (label === "Other") {
      render();
    } else {
      setTimeout(function() { advanceQuestion(); }, 250);
    }
  }
}

function handleTextInput(val) {
  var card = CARDS[currentCard];
  var q = card.questions[currentQuestion];
  answers[card.id][q.id] = val.trim();
}

function handleOtherInput(val) {
  var card = CARDS[currentCard];
  var q = card.questions[currentQuestion];
  otherText[card.id + "_" + q.id] = val.trim();
}

function skipText() {
  var card = CARDS[currentCard];
  var q = card.questions[currentQuestion];
  answers[card.id][q.id] = "";
  advanceQuestion();
}

function advanceQuestion() {
  var card = CARDS[currentCard];
  var q = card.questions[currentQuestion];

  if (q.pick !== "text") {
    var ans = answers[card.id][q.id] || [];
    if (q.min && ans.length < q.min) return;
    if (q.pick === "one" && ans.length === 0) return;
  }

  if (currentQuestion < card.questions.length - 1) {
    currentQuestion++;
    currentView = "question";
  } else {
    if (completedCards.indexOf(currentCard) === -1) {
      completedCards.push(currentCard);
    }
    currentView = "output";
  }
  render();
}

function goBack() {
  if (currentQuestion > 0) {
    currentQuestion--;
    render();
  }
}

function nextCard() {
  if (currentCard < CARDS.length - 1) {
    currentCard++;
    currentQuestion = 0;
    currentView = "cardIntro";
    render();
  }
}

function finishUp() {
  currentView = "final";
  render();
}

function continueFromFinal() {
  var cfi;
  for (cfi = 0; cfi < CARDS.length; cfi++) {
    if (completedCards.indexOf(cfi) === -1) {
      currentCard = cfi;
      currentQuestion = 0;
      currentView = "cardIntro";
      render();
      return;
    }
  }
}

function startOver() {
  var si;
  for (si = 0; si < CARDS.length; si++) {
    answers[CARDS[si].id] = {};
  }
  otherText = {};
  completedCards = [];
  currentCard = 0;
  currentQuestion = 0;
  currentView = "welcome";
  render();
}

// CLIPBOARD
function gatherText(all) {
  var text = generateHeader();
  if (all) {
    var gi;
    for (gi = 0; gi < CARDS.length; gi++) {
      if (completedCards.indexOf(gi) > -1) {
        text += generateMarkdown(gi) + "\n";
      }
    }
  } else {
    text = generateMarkdown(currentCard);
  }
  return text;
}

function copyText(all, evt) {
  var text = gatherText(all);

  function showFeedback() {
    var target = evt ? evt.target : null;
    var btnEl = target ? target.closest(".btn-copy-text") : null;
    if (btnEl) {
      var originalHTML = btnEl.innerHTML;
      btnEl.classList.add("done");
      btnEl.innerHTML = '<svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9.5l3.5 3.5 7-7"/></svg> Copied to clipboard';
      setTimeout(function() {
        btnEl.classList.remove("done");
        btnEl.innerHTML = originalHTML;
      }, 2500);
    }
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(showFeedback).catch(function() {
      fallbackCopy(text);
      showFeedback();
    });
  } else {
    fallbackCopy(text);
    showFeedback();
  }
}

function fallbackCopy(text) {
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.left = "-9999px";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); } catch(e) {}
  document.body.removeChild(ta);
}

// MARKDOWN GENERATION
function generateHeader() {
  return "# My AI Context\n" +
    "> Built with Start Here (angieqbailey.com/start-here)\n" +
    "> Paste this into your AI tool's custom instructions or at the start of a conversation.\n\n---\n\n";
}

function get(cardId, qId) {
  var val = answers[cardId] && answers[cardId][qId];
  if (!val) return [];
  if (typeof val === "string") return val;
  return val;
}

function resolveOther(arr, cardId, qId) {
  var result = [];
  var ri;
  for (ri = 0; ri < arr.length; ri++) {
    if (arr[ri] === "Other") {
      var text = otherText[cardId + "_" + qId];
      if (text) result.push(text);
    } else {
      result.push(arr[ri]);
    }
  }
  return result;
}

function joinNatural(arr) {
  if (!arr || arr.length === 0) return "";
  if (arr.length === 1) return arr[0].toLowerCase();
  if (arr.length === 2) return arr[0].toLowerCase() + " and " + arr[1].toLowerCase();
  var parts = [];
  var ji;
  for (ji = 0; ji < arr.length - 1; ji++) {
    parts.push(arr[ji].toLowerCase());
  }
  return parts.join(", ") + " and " + arr[arr.length - 1].toLowerCase();
}

function joinNaturalKeepCase(arr) {
  if (!arr || arr.length === 0) return "";
  if (arr.length === 1) return arr[0];
  if (arr.length === 2) return arr[0] + " and " + arr[1];
  var parts = [];
  var jki;
  for (jki = 0; jki < arr.length - 1; jki++) {
    parts.push(arr[jki]);
  }
  return parts.join(", ") + " and " + arr[arr.length - 1];
}

var ARCHETYPE_DESC = {
  "Fixer": "I fix what's broken and subtract what's not working",
  "Detective": "I verify before I trust",
  "Maverick": "I move fast and figure it out later",
  "Operator": "I maintain what works and protect the standard"
};

var ARCHETYPE_NOW = {
  "Fixer": "cutting, prioritizing, trying to get ahead of the mess",
  "Detective": "verifying, analyzing, trying to understand before acting",
  "Maverick": "moving fast, making calls, trying to ship before the window closes",
  "Operator": "maintaining, protecting, trying to keep what works running"
};

function generateMarkdown(cardIndex) {
  var card = CARDS[cardIndex];
  switch(card.id) {
    case "context": return genContext();
    case "interaction": return genInteraction();
    case "rightnow": return genRightNow();
    case "fieldguide": return genFieldGuide();
  }
  return "";
}

function genContext() {
  var roleRaw = resolveOther(get("context", "role") || [], "context", "role");
  var role = (roleRaw[0] || "").toLowerCase();
  var exp = (get("context", "experience")[0] || "").toLowerCase();
  var industryRaw = resolveOther(get("context", "industry") || [], "context", "industry");
  var industry = (industryRaw[0] || "").toLowerCase();
  var funcRaw = resolveOther(get("context", "function") || [], "context", "function");
  var func = (funcRaw[0] || "").toLowerCase();
  var skills = resolveOther(get("context", "skills") || [], "context", "skills");
  var env = resolveOther(get("context", "environment") || [], "context", "environment");
  var life = (get("context", "life")[0] || "").toLowerCase();
  var frustrations = resolveOther(get("context", "frustrations") || [], "context", "frustrations");
  var aiGoals = resolveOther(get("context", "aiGoals") || [], "context", "aiGoals");
  var note = get("context", "contextNote");

  var article = (/^[aeiou]/.test(exp)) ? "an" : "a";

  var md = "## Who I Am\n\n";
  if (role && industry) {
    md += "I'm " + article + " " + exp + " " + role + " in " + industry + ", working in " + func + ".\n\n";
  }

  if (skills.length > 0) {
    md += "My work usually requires " + joinNatural(skills) + ".\n\n";
  }

  if (env.length > 0) {
    md += "My work environment is " + joinNatural(env) + ".";
    if (life) md += " Outside work, life is " + life + ".";
    md += "\n\n";
  }

  if (frustrations.length > 0) {
    md += "What frustrates me: " + joinNatural(frustrations) + ".\n\n";
  }

  if (aiGoals.length > 0) {
    md += "Over time, I want AI to help me " + dedupePrefix(aiGoals, "Help me") + ".\n\n";
  }

  if (note) {
    md += 'One thing to know: "' + note + '"\n\n';
  }

  return md;
}

function genInteraction() {
  var archetype = (get("interaction", "archetype")[0] || "");
  var wants = resolveOther(get("interaction", "wants") || [], "interaction", "wants");
  var dislikes = resolveOther(get("interaction", "dislikes") || [], "interaction", "dislikes");
  var pressure = resolveOther(get("interaction", "pressure") || [], "interaction", "pressure");
  var outputs = resolveOther(get("interaction", "outputs") || [], "interaction", "outputs");
  var optimize = resolveOther(get("interaction", "optimize") || [], "interaction", "optimize");
  var note = get("interaction", "interactionNote");

  var md = "## How to Work With Me\n\n";

  if (archetype) {
    var desc = ARCHETYPE_DESC[archetype] || "";
    md += "I'm a " + archetype + ". " + desc + ".\n\n";
  }

  if (wants.length > 0) {
    md += "What I usually want from AI: " + joinNatural(wants) + ".\n\n";
  }

  if (dislikes.length > 0) {
    md += "What I don't want: " + joinNatural(dislikes) + ".\n\n";
  }

  if (pressure.length > 0) {
    md += "When I'm under pressure: " + joinPressure(pressure) + ". That's when I need AI to pull me up, not dig deeper with me.\n\n";
  }

  if (outputs.length > 0) {
    md += "Most useful outputs: " + joinNatural(outputs) + ". ";
  }
  if (optimize.length > 0) {
    md += "Optimize for " + joinNatural(optimize) + ".";
  }
  md += "\n\n";

  if (note) {
    md += 'One thing to know: "' + note + '"\n\n';
  }

  return md;
}

function genRightNow() {
  var state = get("rightnow", "state")[0] || "";
  var needs = resolveOther(get("rightnow", "needs") || [], "rightnow", "needs");
  var bw = resolveOther(get("rightnow", "bandwidth") || [], "rightnow", "bandwidth");
  var frustRaw = resolveOther(get("rightnow", "frustrationNow") || [], "rightnow", "frustrationNow");
  var frust = (frustRaw[0] || "").toLowerCase();
  var priorities = resolveOther(get("rightnow", "priorities") || [], "rightnow", "priorities");
  var outputRaw = resolveOther(get("rightnow", "outputNow") || [], "rightnow", "outputNow");
  var output = (outputRaw[0] || "").toLowerCase();
  var note = get("rightnow", "rightnowNote");

  var md = "## Right Now\n\n";
  md += "*Update this card when your situation changes. This is temporary context.*\n\n";

  if (state) {
    var stateDesc = ARCHETYPE_NOW[state];
    var stateText = stateDesc ? stateDesc.charAt(0).toUpperCase() + stateDesc.slice(1) : "";
    md += "I'm in " + state + " mode right now. " + stateText + ".\n\n";
  }

  if (needs.length > 0) {
    md += "What I need most right now: " + joinNatural(needs) + ".\n\n";
  }

  if (bw.length > 0) {
    md += "My bandwidth is squeezed by " + joinNatural(bw) + ".";
    if (frust) md += " Main frustration: " + frust + ".";
    md += "\n\n";
  }

  if (priorities.length > 0) {
    md += "In this moment, prioritize " + joinNatural(priorities) + ".";
    if (output) md += " I need a " + output + ", not a deep analysis.";
    md += "\n\n";
  }

  if (note) {
    md += 'Right now: "' + note + '"\n\n';
  }

  return md;
}

function genFieldGuide() {
  var useful = resolveOther(get("fieldguide", "useful") || [], "fieldguide", "useful");
  var overtrust = resolveOther(get("fieldguide", "overtrust") || [], "fieldguide", "overtrust");
  var misuse = resolveOther(get("fieldguide", "misuse") || [], "fieldguide", "misuse");
  var slow = resolveOther(get("fieldguide", "slowdown") || [], "fieldguide", "slowdown");
  var check = resolveOther(get("fieldguide", "checkself") || [], "fieldguide", "checkself");
  var help = resolveOther(get("fieldguide", "helpwithout") || [], "fieldguide", "helpwithout");
  var note = get("fieldguide", "fieldguideNote");

  var md = "## My AI Guardrails\n\n";

  if (useful.length > 0) {
    md += "Where AI helps me most: " + joinNatural(useful) + ".\n\n";
  }

  if (overtrust.length > 0) {
    md += "Where I over-trust AI: " + joinNatural(overtrust) + ".\n";
  }
  if (misuse.length > 0) {
    md += "Where I misuse AI: " + joinNatural(misuse) + ".\n\n";
  }

  if (slow.length > 0) {
    md += "Slow down and review carefully when working on: " + joinNatural(slow) + ".\n\n";
  }

  if (check.length > 0) {
    md += "My check-yourself move before using AI output: " + joinNatural(check) + ".\n\n";
  }

  if (help.length > 0) {
    md += "I want AI to help me " + joinNatural(help) + "... without taking over.\n\n";
  }

  if (note) {
    md += 'Watch out for this: "' + note + '"\n\n';
  }

  return md;
}

// MORE UTILITIES
function toGerund(phrase) {
  var verbMap = {
    "write": "writing", "make": "making", "manage": "managing",
    "solve": "solving", "organize": "organizing", "communicate": "communicating",
    "move": "moving", "create": "creating", "handle": "handling",
    "build": "building", "save": "saving", "improve": "improving",
    "help": "helping", "reduce": "reducing", "get": "getting"
  };
  var words = phrase.split(" ");
  var firstWord = words[0].toLowerCase();
  if (verbMap[firstWord]) {
    words[0] = verbMap[firstWord];
  } else if (firstWord.charAt(firstWord.length - 1) === "e") {
    words[0] = firstWord.substring(0, firstWord.length - 1) + "ing";
  } else {
    words[0] = firstWord + "ing";
  }
  return words.join(" ").toLowerCase();
}

function joinPressure(arr) {
  if (!arr || arr.length === 0) return "";
  if (arr.length === 1) return arr[0];
  var lowerFirst = function(s) {
    if (s.substring(0, 2) === "I ") return s;
    return s.charAt(0).toLowerCase() + s.substring(1);
  };
  if (arr.length === 2) return arr[0] + " and " + lowerFirst(arr[1]);
  var parts = [];
  var pi;
  for (pi = 0; pi < arr.length - 1; pi++) {
    parts.push(arr[pi]);
  }
  return parts.join(", ") + " and " + lowerFirst(arr[arr.length - 1]);
}

function dedupePrefix(arr, prefix) {
  var lowerPrefix = prefix.toLowerCase();
  if (!arr || arr.length === 0) return "";
  var cleaned = [];
  var di;
  for (di = 0; di < arr.length; di++) {
    var lower = arr[di].toLowerCase();
    if (di > 0 && lower.indexOf(lowerPrefix) === 0) {
      cleaned.push(lower.substring(lowerPrefix.length).trim());
    } else {
      cleaned.push(lower);
    }
  }
  if (cleaned.length === 1) return cleaned[0];
  if (cleaned.length === 2) return cleaned[0] + " and " + cleaned[1];
  var front = [];
  var ddi;
  for (ddi = 0; ddi < cleaned.length - 1; ddi++) {
    front.push(cleaned[ddi]);
  }
  return front.join(", ") + " and " + cleaned[cleaned.length - 1];
}
